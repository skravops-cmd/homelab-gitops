apiVersion: apps/v1
kind: Deployment
metadata:
  name: proto-pump-redis
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proto-pump-redis
  template:
    metadata:
      labels:
        app: proto-pump-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
