apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: zen-timer
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/skravops-cmd/homelab-gitops.git
    targetRevision: main
    path: apps/zen-timer/base

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
