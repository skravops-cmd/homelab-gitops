apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dish-lab-mongo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/skravops-cmd/homelab-gitops.git
    targetRevision: main
    path: apps/dish-lab-mongo/base
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
